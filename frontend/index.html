    <!-- ==================== CSP (fix/csp-meta-tag-and-cover-fallback) ====================
         SOURCE UNIQUE de Content-Security-Policy. Précédents fix (PR #63 / #64) passaient
         par vercel.json `headers` mais s'appliquaient pas instantanément en prod : Vercel
         CDN edge cache + SW Workbox servaient l'ancien HTML cached avant le déploiement
         de la nouvelle CSP.
         Meta tag = embarqué dans le HTML → toujours aligné avec la version SW courante.

         Notes :
         - 'unsafe-eval' : requis YouTube IFrame (www-widgetapi.js eval interne)
         - data: dans media-src : silent WAV buffer Safari audio unlock (PreGameStartScreen)
         - blob: dans media-src + worker-src : MediaRecorder + SW Workbox
         - api.anthropic.com : génération aliases IA (PR #65 feat/ai-aliases-voice-matching)
         - tuttiparty.app + wss : backend Railway + Socket.IO
         - youtube-nocookie.com : privacy-enhanced YouTube IFrame embed mode
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.youtube.com https://www.youtube-nocookie.com https://*.ytimg.com https://www.google.com https://www.gstatic.com https://www.googletagmanager.com https://sdk.scdn.co https://*.scdn.co https://*.spotify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: data: https://*.googlevideo.com https://*.scdn.co https://*.youtube.com https://*.ytimg.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.deepgram.com https://api.assemblyai.com https://*.assemblyai.com https://api.anthropic.com https://api.openai.com https://api.spotify.com https://accounts.spotify.com https://*.spotify.com https://www.youtube.com https://*.youtube.com https://www.googleapis.com https://api.tuttiparty.app wss://api.tuttiparty.app wss: ws: https:; frame-src 'self' https://*.youtube.com https://www.youtube.com https://youtube.com https://www.youtube-nocookie.com https://accounts.google.com https://sdk.scdn.co; worker-src 'self' blob:; manifest-src 'self'; child-src 'self' blob: https://*.youtube.com"
    />

    <!-- ==================== PWA (feat/pwa-installable) ==================== -->
    <!-- Web App Manifest : injecté automatiquement par vite-plugin-pwa.
         Le link explicite ci-dessous est inoffensif (override sur même path)
         mais sert de fallback si le plugin change de nom de fichier. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- iOS PWA meta tags : permettent l'install plein écran via "Sur l'écran
         d'accueil" depuis Safari (Partager). apple-mobile-web-app-capable +
         status-bar-style contrôlent le rendu standalone (sans barre Safari).
         black-translucent = barre transparente, contenu scrolle en-dessous
         (look edge-to-edge). Si on veut une barre cream opaque plus tard :
         remplacer par "default". -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tutti" />

    <!-- ==================== ANTI-READER MODE (Safari) ====================
         fix/prevent-safari-reader-mode — Safari peut suggérer son mode Lecteur
         sur des pages détectées comme "articles" (structure sémantique +
         beaucoup de texte). Tutti est une SPA interactive — la lecture mode
         lecteur casse tout (YT IFrame retiré, boutons inactifs, audio coupé).
         format-detection telephone=no aide Safari à comprendre qu'on n'est
         pas un article éditorial. Combiné avec role="application" sur <main>
         côté HostPage/LandingPage. -->
    <meta name="format-detection" content="telephone=no" />
